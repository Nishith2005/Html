<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - HealthInsight Hub</title>
  <link rel="icon" type="image/x-icon" href="logos_ico.ico">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #1a3c5e;
      --secondary-color: #4fd1c5;
      --background-color: #e0f7ff;
      --card-bg-color: #ffffff;
      --text-color: #2d3748;
      --subtle-text-color: #718096;
      --border-color: #e2e8f0;
      --shadow-color: rgba(0, 0, 0, 0.08);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
      box-sizing: border-box;
    }

    .logo-link {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
    }

    .logo-main {
      width: 100px;
    }

    .header {
      text-align: center;
      margin: 2rem 0;
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: 2.8rem;
      color: var(--primary-color);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .user-greeting {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--primary-color);
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--subtle-text-color);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .dashboard-container {
      background-color: var(--card-bg-color);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 25px var(--shadow-color);
      width: 100%;
      max-width: 800px;
    }

    .dashboard-container h2 {
      color: var(--primary-color);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
      margin: 0 0 1.5rem 0;
      font-weight: 600;
      font-size: 1.5rem;
    }

    .ailments-list {
      list-style: none;
      padding: 0;
      width: 100%;
    }

    .ailments-list li {
      background-color: #f8fafc;
      border: 1px solid var(--border-color);
      border-left: 5px solid var(--secondary-color);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 10px var(--shadow-color);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .ailments-list li:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
    }

    .ailment-details {
      flex-grow: 1;
      margin-right: 1rem;
    }

    .ailment-part {
      font-weight: 600;
      color: var(--primary-color);
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .condition-info {
      font-size: 1rem;
      color: var(--subtle-text-color);
      line-height: 1.6;
    }

    .condition-info strong {
        color: var(--text-color);
    }

    .severity {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .low { background-color: #e6fffa; color: #38a169; }
    .medium { background-color: #fefcbf; color: #d69e2e; }
    .high { background-color: #fff5f5; color: #e53e3e; }

    .delete-btn {
      background-color: #fed7d7;
      color: #c53030;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background-color 0.3s, color 0.3s;
    }

    .delete-btn:hover {
      background-color: #f56565;
      color: white;
    }

    .no-ailments {
      text-align: center;
      color: var(--subtle-text-color);
      font-size: 1rem;
      padding: 2rem;
      background-color: #f7fafc;
      border: 1px dashed var(--border-color);
      border-radius: 8px;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: flex-end;
    }

    .dashboard-btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background-color 0.3s, transform 0.2s;
    }

    #show-history-btn {
      background-color: var(--primary-color);
      color: white;
    }

    #show-history-btn:hover {
      background-color: #2c5282;
      transform: translateY(-2px);
    }

    #logout-btn {
      background-color: #e2e8f0;
      color: var(--primary-color);
    }

    #logout-btn:hover {
        background-color: #cbd5e0;
        transform: translateY(-2px);
    }

    .footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--subtle-text-color);
      font-size: 0.9rem;
      margin-top: auto;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }
      .header {
        margin: 1rem 0 1.5rem;
      }
      h1 {
        font-size: 2rem;
      }
      .user-greeting {
          font-size: 1.2rem;
      }
      .dashboard-container {
        padding: 1.5rem;
      }
      .ailments-list li {
          flex-direction: column;
          align-items: flex-start;
      }
      .delete-btn {
          margin-top: 1rem;
      }
      .button-group {
          flex-direction: column;
      }
      .dashboard-btn {
          width: 100%;
          text-align: center;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="logo-link">
    <img src="logos.png" alt="HealthInsight Hub Logo" class="logo-main">
  </a>

  <div class="header">
    <p class="user-greeting">Welcome back!</p>
    <h1>User Dashboard</h1>
    <p class="subtitle">Here's a summary of your recent diagnostic results. You can view your history or log out.</p>
  </div>

  <div class="dashboard-container">
    <h2>My Diagnosis History</h2>
    <ul class="ailments-list" id="ailments-list"></ul>
    <div id="no-ailments" class="no-ailments" style="display: none;">
      You have no diagnosis history yet.
    </div>
    <div class="button-group">
      <button class="dashboard-btn" id="show-history-btn">Refresh History</button>
      <button class="dashboard-btn" id="logout-btn">Logout</button>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; <span id="current-year"></span> HealthInsight Hub. All Rights Reserved.</p>
  </footer>

  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();

    const showHistoryBtn = document.getElementById('show-history-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const ailmentsList = document.getElementById('ailments-list');
    const noAilmentsMsg = document.getElementById('no-ailments');
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = 'login.html';
    }

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    });

    showHistoryBtn.addEventListener('click', fetchDiagnosisHistory);

    async function fetchDiagnosisHistory() {
      try {
        const response = await fetch('http://localhost:5000/api/diagnoses', {
          headers: { 'x-auth-token': token },
        });
        if (!response.ok) throw new Error('Failed to fetch history');
        const diagnoses = await response.json();
        renderDiagnoses(diagnoses);
      } catch (error) {
        console.error('Error fetching history:', error);
        ailmentsList.innerHTML = '<li>Error loading history. Please try again.</li>';
      }
    }

    function renderDiagnoses(diagnoses) {
      ailmentsList.innerHTML = '';
      if (diagnoses.length === 0) {
        noAilmentsMsg.style.display = 'block';
      } else {
        noAilmentsMsg.style.display = 'none';
        diagnoses.forEach(diagnosis => {
          const li = document.createElement('li');
          li.dataset.id = diagnosis._id;
          const severityClass = diagnosis.severity.toLowerCase();
          li.innerHTML = `
            <div class="ailment-details">
              <div class="ailment-part">${diagnosis.bodyPart}</div>
              <div class="condition-info">
                <strong>Potential Condition:</strong> ${diagnosis.condition}<br>
                <strong>Description:</strong> ${diagnosis.description}<br>
                <span class="severity ${severityClass}">${diagnosis.severity}</span>
              </div>
            </div>
            <button class="delete-btn">Delete</button>
          `;
          ailmentsList.appendChild(li);
        });
      }
    }

    ailmentsList.addEventListener('click', async (e) => {
      if (e.target.classList.contains('delete-btn')) {
        const li = e.target.closest('li');
        const diagnosisId = li.dataset.id;
        if (confirm('Are you sure you want to delete this diagnosis?')) {
          try {
            const response = await fetch(`http://localhost:5000/api/diagnoses/${diagnosisId}`, {
              method: 'DELETE',
              headers: { 'x-auth-token': token },
            });
            if (!response.ok) throw new Error('Failed to delete diagnosis');
            li.remove();
            if (ailmentsList.children.length === 0) {
              noAilmentsMsg.style.display = 'block';
            }
          } catch (error) {
            console.error('Error deleting diagnosis:', error);
            alert('Failed to delete diagnosis.');
          }
        }
      }
    });

    // Fetch history on page load
    fetchDiagnosisHistory();
  </script>
</body>
</html>
