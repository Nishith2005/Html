<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard - Health Insight Hub</title>
  <link rel="icon" type="image/x-icon" href="logos_ico.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Segoe+UI&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      font-family: 'Inter', 'Roboto', 'Segoe UI', sans-serif;
      background-color: rgb(180, 223, 245);
      color: #2d3748;
      min-height: 100vh;
      padding: 20px;
      padding-top: 160px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(220, 235, 250, 0.2) 1px, transparent 1px);
      background-size: 20px 20px;
      animation: float 20s infinite linear;
      z-index: -1;
      opacity: 0.25;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-100px); }
    }

    .logo-link {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
    }

    .logo-main {
      width: 125px;
      height: 125px;
    }

    .header {
      text-align: center;
      margin: 0 0 40px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      color: #1a3c5e;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .user-greeting {
        font-size: 1.2rem;
        color: #4a5568;
        margin-bottom: 20px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #718096;
      max-width: 600px;
      margin: 0 auto 30px;
      line-height: 1.6;
    }

    .dashboard-container {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 700px;
      text-align: left;
      display: flex;
      flex-direction: column;

    }

    .dashboard-container h2 {
      color: #1a3c5e;
      border-bottom: 2px solid #e6f3fa;
      padding-bottom: 15px;
      margin-bottom: 20px;
      font-weight: 600;
      width: 100%;
      text-align: left;
    }

    .ailments-list {
      list-style: none;
      padding: 0;
      width: 100%;
    }

    .ailments-list li {
      background-color: #f7fafc;
      border-left: 4px solid #ef4444;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ailment-details {
        flex-grow: 1;
    }

    .ailments-list .ailment-part {
      font-weight: 600;
      color: #1a3c5e;
      font-size: 1.1rem;
      margin-bottom: 5px;
    }

    .ailments-list .condition-info {
      font-size: 0.95rem;
      color: #4a5568;
      line-height: 1.5;
    }
    .ailments-list .condition-info .severity {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 15px;
        font-size: 0.8rem;
        margin-top: 5px;
        font-weight: 500;
    }
    .ailments-list .condition-info .low { background-color: #e6fffa; color: #38a169; }
    .ailments-list .condition-info .medium { background-color: #fefcbf; color: #d69e2e; }
    .ailments-list .condition-info .high { background-color: #fff5f5; color: #e53e3e; }

    .delete-btn {
        background-color: #ef4444;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .delete-btn:hover {
        background-color: #d93737;
    }


    .no-ailments {
        text-align: center;
        color: #718096;
        font-size: 1rem;
        padding: 20px;
        background-color: #f0f4f8;
        border-radius: 8px;
        width: 100%;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #718096;
      font-size: 0.9rem;
      margin-top: 40px;
      width: 100%;
    }
    .button-group {
        display: flex;
        gap: 10px;
        margin-top: 25px;
    }
    .animated-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 16px 36px;
      border: 4px solid;
      border-color: transparent;
      font-size: 16px;
      background-color: inherit;
      border-radius: 100px;
      font-weight: 600;
      color: #1a3c5e;
      box-shadow: 0 0 0 2px #1a3c5e;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      justify-content: center;
      min-width: 100px;
      box-sizing: border-box;
    }

    .animated-button svg {
      position: absolute;
      width: 24px;
      fill: #1a3c5e;
      z-index: 9;
      transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .animated-button .arr-1 {
      right: 16px;
    }

    .animated-button .arr-2 {
      left: -25%;
    }

    .animated-button .circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background-color: #4fd1c5;
      border-radius: 50%;
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .animated-button .text {
      position: relative;
      z-index: 1;
      transform: translateX(-12px);
      transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .animated-button:hover {
      box-shadow: 0 0 0 4px transparent;
      color: #ffffff;
      border-radius: 12px;
      border-color: #4fd1c5;
    }

    .animated-button:hover .arr-1 {
      right: -25%;
    }

    .animated-button:hover .arr-2 {
      left: 16px;
    }

    .animated-button:hover .text {
      transform: translateX(12px);
    }

    .animated-button:hover svg {
      fill: #ffffff;
    }

    .animated-button:active {
      scale: 0.95;
      box-shadow: 0 0 0 4px #38a169;
    }

    .animated-button:hover .circle {
      width: 220px;
      height: 220px;
      opacity: 1;
    }

    @media (max-width: 768px) {
      body {
        padding-top: 140px;
      }
      .logo-link {
        top: 15px;
        left: 15px;
      }
      .logo-main {
        width: 100px;
        height: 100px;
      }
      h1 {
        font-size: 2rem;
      }
      .subtitle {
        font-size: 1rem;
      }
      .dashboard-container {
        padding: 20px;
      }
      .animated-button {
        padding: 14px 30px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="logo-link">
    <img src="logos.png" alt="Health Insight Hub Logo" class="logo-main">
  </a>

  <div class="header">
    <h1>User Dashboard</h1>
    <p class="user-greeting">Welcome back!</p>
    <p class="subtitle">Here's a summary of your recent diagnostic results.</p>
  </div>

  <div class="dashboard-container">
    <h2>My Diagnosed Ailments</h2>

    <ul class="ailments-list" id="ailments-list">
      <!-- Diagnosis history will be populated here -->
    </ul>
    <div id="no-ailments" class="no-ailments" style="display: none;">You have no diagnosis history.</div>

    <div class="button-group">
        <button class="animated-button" id="show-history-btn">
            <span class="text">Show History</span>
        </button>
        <button class="animated-button" id="logout-btn">
            <span class="text">Logout</span>
        </button>
    </div>

  </div>

  <footer class="footer">
    <p>&copy; <span id="current-year"></span> Health Insight Hub. All Rights Reserved.</p>
  </footer>
  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();

    const showHistoryBtn = document.getElementById('show-history-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const ailmentsList = document.getElementById('ailments-list');
    const noAilmentsMsg = document.getElementById('no-ailments');
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = 'user_login.html';
    }

    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    });

    showHistoryBtn.addEventListener('click', fetchDiagnosisHistory);

    async function fetchDiagnosisHistory() {
        try {
            const response = await fetch('http://localhost:5000/api/diagnoses', {
                headers: {
                    'x-auth-token': token,
                },
            });

            if (!response.ok) {
                throw new Error('Failed to fetch history');
            }

            const diagnoses = await response.json();
            renderDiagnoses(diagnoses);

        } catch (error) {
            console.error('Error fetching history:', error);
            ailmentsList.innerHTML = '<li>Error loading history.</li>';
        }
    }

    function renderDiagnoses(diagnoses) {
        ailmentsList.innerHTML = '';
        if (diagnoses.length === 0) {
            noAilmentsMsg.style.display = 'block';
        } else {
            noAilmentsMsg.style.display = 'none';
            diagnoses.forEach(diagnosis => {
                const li = document.createElement('li');
                li.setAttribute('data-id', diagnosis._id);

                const severityClass = diagnosis.severity.toLowerCase();

                li.innerHTML = `
                    <div class="ailment-details">
                        <div class="ailment-part">${diagnosis.bodyPart}</div>
                        <div class="condition-info">
                            <strong>Potential Condition:</strong> ${diagnosis.condition}<br>
                            <strong>Description:</strong> ${diagnosis.description}<br>
                            <span class="severity ${severityClass}">${diagnosis.severity} Severity</span>
                        </div>
                    </div>
                    <button class="delete-btn">Delete</button>
                `;
                ailmentsList.appendChild(li);
            });
        }
    }

    ailmentsList.addEventListener('click', async (e) => {
        if (e.target.classList.contains('delete-btn')) {
            const li = e.target.closest('li');
            const diagnosisId = li.getAttribute('data-id');

            if (confirm('Are you sure you want to delete this diagnosis?')) {
                try {
                    const response = await fetch(`http://localhost:5000/api/diagnoses/${diagnosisId}`, {
                        method: 'DELETE',
                        headers: {
                            'x-auth-token': token,
                        },
                    });

                    if (!response.ok) {
                        throw new Error('Failed to delete diagnosis');
                    }

                    li.remove();
                    const diagnoses = await response.json();
                    if(ailmentsList.children.length === 0){
                        noAilmentsMsg.style.display = 'block';
                    }

                } catch (error) {
                    console.error('Error deleting diagnosis:', error);
                    alert('Failed to delete diagnosis.');
                }
            }
        }
    });
  </script>
</body>
</html>
