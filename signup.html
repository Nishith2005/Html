<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - HealthInsight Hub</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="logos_ico.ico">
</head>
<body>
  <a href="index.html">
    <img src="output-onlinepngtools (1).png" alt="HealthInsight Hub LOGO" id="logo">
  </a>
  <div class="login-container">
    <div class="form-section">
      <h2>Create Your Account</h2>
      <p>Already have an account? <a href="login.html">Login</a></p>
      <form class="login-form" id="signup-form">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required />

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm password" required />

        <button type="submit" class="login-btn">Sign Up</button>
      </form>
      <p id="error-message" style="color: red; margin-top: 1rem;"></p>
    </div>
    <div class="image-section">
      <img src="loger_finall.png" alt="A person using a health app, illustrating the benefits of signing up.">
    </div>
  </div>
  <script src="signup.js"></script>
</body>
</html>
